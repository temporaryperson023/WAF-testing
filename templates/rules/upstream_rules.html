<!DOCTYPE html>
<html>

<head>
    <title>Upstream Rules</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="nav">
        <div class="nav-brand" onclick="location.href='/rules/'" style="cursor:pointer;">
            <div class="nav-brand-dot"></div>
            Rules Lab
        </div>
    </div>

    <div class="test-page">

        <!-- LEFT -->
        <div class="col">

            <div class="panel">
                <div class="panel-header">Trigger Request</div>
                <div class="panel-body">

                    <button class="btn btn-primary" onclick="hitEndpoint()">
                        Send Request
                    </button>

                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Response</div>
                <div class="panel-body">
                    <pre id="resultBox">No request yet</pre>
                </div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="col">

            <div class="panel">
                <div class="panel-header">⚙️ WAF Config Guide</div>
                <div class="panel-body">

                    <p><b>Rule Type:</b> Upstream Rule</p>

                    <br>

                    <p><b>Try:</b></p>
                    <ul>
                        <li>Route /upstream/test → /upstream/alt</li>
                    </ul>

                    <br>

                    <p><b>Expected:</b></p>
                    <ul>
                        <li>Without WAF → main-server</li>
                        <li>With WAF → alternate-server</li>
                    </ul>

                </div>
            </div>

        </div>

    </div>

    <script>
        function hitEndpoint() {
            fetch('/rules/upstream/test')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('resultBox').innerText =
                        JSON.stringify(data, null, 2);
                });
        }
    </script>

</body>

</html>
