<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="nav">
        <div class="nav-brand">
            <div class="nav-brand-dot"></div>
            Admin Panel
        </div>
    </div>

    <div class="test-page">

        <div class="col">

            <div class="panel">
                <div class="panel-header">User Database</div>
                <div class="panel-body">

                    <table border="1" style="width:100%; font-size:12px;">
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Password</th>
                            <th>Role</th>
                            <th>Email</th>
                        </tr>

                        {% for user in users %}
                        <tr>
                            <td>{{ user['id'] }}</td>
                            <td>{{ user['username'] }}</td>
                            <td>{{ user['password'] }}</td>
                            <td>{{ user['role'] }}</td>
                            <td>{{ user['email'] }}</td>
                        </tr>
                        {% endfor %}

                    </table>

                </div>
            </div>

        </div>

    </div>

</body>

</html>
